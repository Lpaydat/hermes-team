name: grill_followup
version: 1.0.0
description: "Auto-create a follow-up grill kanban card when PO intercoms VB during a venture-grill, so the grill self-loops across PO sessions. Idempotent + self-terminating."
author: Hermes
kind: backend
# Registers no tools — only a post_tool_call hook that spawns the next grill card.
hooks:
  - post_tool_call
