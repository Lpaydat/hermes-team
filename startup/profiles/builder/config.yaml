_config_version: 33
agent:
  api_max_retries: 10
  max_turns: 200
  reasoning_effort: ultra
auxiliary:
  vision:
    model: glm-4.6
    provider: zai
command_allowlist:
- script execution via -e/-c flag
- execute_code
display:
  skin: dgx-spark
fallback_providers:
- model: deepseek-v4-flash
  provider: deepseek
kanban:
  max_in_progress: 3
  max_in_progress_per_profile: 3
model:
  base_url: ''
  context_length: 1000000
  default: glm-5.2
  provider: zai
onboarding:
  seen:
    busy_input_prompt: true
    tool_progress_prompt: true
plugins:
  disabled: []
  enabled:
  - kanban_chains
  - loop_engine
  - context_graph
  entries:
    kanban_chains:
      allow_tool_override: false
    loop_engine:
