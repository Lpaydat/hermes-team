model:
  default: glm-5.2
  provider: zai
  base_url: https://api.z.ai/api/coding/paas/v4
  context_length: 1000000
toolsets:
- hermes-cli
- kanban
- kanban_chains
- loop_engine
agent:
  api_max_retries: 10
  reasoning_effort: xhigh
kanban:
  max_in_progress_per_profile: 3
  max_in_progress: 3
  dispatch_stale_timeout_seconds: 14400
skills:
  disabled:
  - design-an-interface
  - request-refactor-plan
  - ubiquitous-language
  - claude-handoff
  - code-review
  - find-skills
  - grill-me
  - grill-with-docs
  - grilling
  - handoff
  - implement
  - loop-me
  - prototype
  - research
  - resolving-merge-conflicts
  - tdd
  - to-spec
  - to-tickets
  - triage
  - wayfinder
  - codebase-design
  - domain-modeling
  - improve-codebase-architecture
  - team-delegation
  - team-observability
  - live-testing
  - wayfinding-auto
  - qa-build
  - qa-exploratory
  - qa-functional
  - qa-journeys
  - qa-protocol
  - qa-security
  - requesting-code-review
  - hermes-agent-skill-authoring
  - web-research
  - claude-code
  - codex
  - decision-mapping
  - obsidian
  - opencode
  - ponytail
  - ponytail-audit
  - ponytail-debt
  - ponytail-gain
  - ponytail-help
  - ponytail-review
  - ask-matt
  - edit-article
  - git-guardrails-claude-code
  - migrate-to-shoehorn
  - obsidian-vault
  - qa
  - scaffold-exercises
  - setup-matt-pocock-skills
  - setup-pre-commit
  - teach
  - wizard
  - writing-beats
  - writing-fragments
  - writing-great-skills
  - writing-shape
approvals:
  mode: 'off'
  cron_mode: deny
command_allowlist:
- execute_code
- copy/move file into sensitive credential/SSH/shell-rc path
- script execution via -e/-c flag
- recursive delete
onboarding:
  seen:
    tool_progress_prompt: true
_config_version: 33
plugins:
  enabled:
  - kanban_chains
  - loop_engine
  disabled: []
  entries:
    kanban_chains:
      allow_tool_override: false
    loop_engine:
      allow_tool_override: false
