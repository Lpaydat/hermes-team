<!--
  Single-File API Prototype Skeleton
  Copy this file, rename, and modify the API URL + rendering logic.
  Zero dependencies — open directly or serve with python3 -m http.server.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototype</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  font-family: system-ui, sans-serif;
  background: #1a1a2e;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

h1 {
  font-size: 2rem;
  margin-bottom: 0.5rem;
}

.subtitle {
  color: #888;
  font-size: 0.95rem;
  margin-bottom: 2rem;
}

.input-area {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 1rem;
}

input[type="text"] {
  padding: 0.7rem 1rem;
  font-size: 1rem;
  background: #2a2a4e;
  border: 1px solid #444;
  border-radius: 8px;
  color: #eee;
  outline: none;
  width: 240px;
}
input[type="text"]:focus { border-color: #7c72ff; }

button {
  padding: 0.7rem 1.5rem;
  font-size: 1rem;
  background: #5c4ce0;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.2s, transform 0.1s;
}
button:hover { transform: translateY(-1px); }
button:disabled { opacity: 0.5; cursor: wait; }

.error {
  color: #f87171;
  font-size: 0.9rem;
  min-height: 1.2em;
  text-align: center;
}

.loading {
  color: #7c72ff;
  font-style: italic;
  display: none;
}
.loading.active { display: block; }
.loading::after {
  content: '';
  animation: dots 1.5s infinite steps(1);
}
@keyframes dots {
  0% { content: '.'; }
  33% { content: '..'; }
  66% { content: '...'; }
}

.result-card {
  max-width: 550px;
  width: 100%;
  background: #23234a;
  border: 1px solid #3a3a5e;
  border-radius: 12px;
  padding: 1.5rem;
  margin-top: 1.5rem;
  display: none;
}
.result-card.active {
  display: block;
  animation: fadeIn 0.4s ease-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<h1>Prototype Title</h1>
<p class="subtitle">Subtitle goes here</p>

<div class="input-area">
  <input type="text" id="input" placeholder="Enter query..." autocomplete="off">
  <button id="btn" onclick="run()">Go</button>
</div>

<p class="error" id="error"></p>
<p class="loading" id="loading">Loading</p>

<div class="result-card" id="card"></div>

<script>
// Enter key submits
document.getElementById('input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') run();
});

async function run() {
  const query = document.getElementById('input').value.trim();
  const errEl = document.getElementById('error');
  const loadEl = document.getElementById('loading');
  const card = document.getElementById('card');
  const btn = document.getElementById('btn');

  errEl.textContent = '';
  card.classList.remove('active');
  btn.disabled = true;

  if (!query) {
    errEl.textContent = 'Please enter a value.';
    btn.disabled = false;
    return;
  }

  loadEl.classList.add('active');

  try {
    // ---- MODIFY: your API URL and logic ----
    // Example: parallel fetch of two endpoints
    const [res1, res2] = await Promise.all([
      fetch(`https://api.example.com/${encodeURIComponent(query)}`),
      fetch(`https://api.example.com/${encodeURIComponent(query)}/details`)
    ]);

    // Handle common HTTP errors
    if (res1.status === 404) {
      throw new Error(`No results for "${query}".`);
    }
    if (res1.status === 403 || res1.status === 429) {
      throw new Error('Rate limit reached. Try again later.');
    }
    if (!res1.ok) throw new Error('Request failed.');

    const data1 = await res1.json();
    const data2 = res2.ok ? await res2.json() : null;

    loadEl.classList.remove('active');
    render(data1, data2);
    card.classList.add('active');

  } catch (e) {
    loadEl.classList.remove('active');
    errEl.textContent = e.message;
  } finally {
    btn.disabled = false;
  }
}

// ---- MODIFY: your rendering logic ----
function render(data, details) {
  const card = document.getElementById('card');
  card.innerHTML = `
    <h2>${data.name || data.title || 'Result'}</h2>
    <p>${data.description || ''}</p>
    <!-- Add your fields here -->
  `;
}
</script>

</body>
</html>
