model:
  default: glm-5.2
  provider: zai
  base_url: https://api.z.ai/api/coding/paas/v4
  context_length: 1000000
  rate_limit_delay: 30
toolsets:
- hermes-cli
- kanban
- intercom
agent:
  api_max_retries: 10
  reasoning_effort: xhigh
browser:
  allow_private_urls: true
kanban:
  max_in_progress_per_profile: 3
  dispatch_stale_timeout_seconds: 14400
skills:
  disabled:
  - ask-matt
  - edit-article
  - git-guardrails-claude-code
  - migrate-to-shoehorn
  - scaffold-exercises
  - teach
  - wizard
  - writing-beats
  - writing-fragments
  - writing-shape
approvals:
  mode: smart
command_allowlist:
- copy/move file into system config path
- script execution via -e/-c flag
- execute_code
security:
  allow_private_urls: true
onboarding:
  seen:
    tool_progress_prompt: true
_config_version: 32
fallback_model: []
platform_toolsets:
  cli:
  - kanban
  - memory
  - session_search
  - skills
  - terminal
  - todo
known_plugin_toolsets:
  cli:
  - spotify
plugins:
  enabled:
  - intercom
  - kanban_chains
  disabled: []
  entries:
    intercom:
      allow_tool_override: true
    kanban_chains:
      allow_tool_override: false
