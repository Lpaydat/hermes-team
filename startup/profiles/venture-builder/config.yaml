command_allowlist:
  - script execution via -e/-c flag
_config_version: 33
fallback_providers:
  - provider: deepseek
    model: deepseek-v4-flash
plugins:
  enabled:
    - intercom
    - kanban_chains
    - context_graph
  disabled: []
  entries:
    intercom:
      allow_tool_override: true
    kanban_chains:
      allow_tool_override: false
kanban:
  max_in_progress_per_profile: 3
  max_in_progress: 3
onboarding:
  seen:
    tool_progress_prompt: true
