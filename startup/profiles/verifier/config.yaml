model:
  default: glm-5.2
  provider: zai
  base_url: https://api.z.ai/api/coding/paas/v4
  context_length: 1000000
  rate_limit_delay: 30
toolsets:
- hermes-cli
- kanban
agent:
  api_max_retries: 10
kanban:
  max_in_progress_per_profile: 3
  dispatch_stale_timeout_seconds: 14400
skills:
  disabled:
  - ask-matt
  - codebase-design
  - codex
  - decision-mapping
  - design-an-interface
  - diagnosing-bugs
  - domain-modeling
  - edit-article
  - git-guardrails-claude-code
  - handoff
  - implement
  - improve-codebase-architecture
  - migrate-to-shoehorn
  - opencode
  - ponytail
  - ponytail-audit
  - ponytail-gain
  - ponytail-help
  - prototype
  - qa
  - request-refactor-plan
  - resolving-merge-conflicts
  - scaffold-exercises
  - setup-matt-pocock-skills
  - setup-pre-commit
  - tdd
  - teach
  - to-tickets
  - to-spec
  - triage
  - ubiquitous-language
  - wizard
  - writing-beats
  - writing-fragments
  - writing-shape
  - find-skills
  - grill-me
  - grill-with-docs
  - grilling
  - loop-me
  - obsidian-vault
  - writing-great-skills
onboarding:
  seen:
    tool_progress_prompt: true
_config_version: 33
fallback_model: []
plugins:
  enabled:
  - intercom
  - kanban_chains
  disabled: []
  entries:
    intercom:
      allow_tool_override: true
    kanban_chains:
      allow_tool_override: false
